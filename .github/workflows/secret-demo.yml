name: Secret Demo

on:
  push:
    branches:
      - main

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Verify Secret Configuration
        run: |
          echo "========================================"
          echo "Secret Configuration Verification"
          echo "========================================"
          if [ -z "${{ secrets.API_KEY }}" ]; then
            echo "⚠️  API_KEY secret is NOT configured"
            exit 1
          else
            echo "✅ API_KEY secret is configured"
            echo "Secret length: ${#API_KEY} characters"
          fi
          echo "========================================"
        env:
          API_KEY: ${{ secrets.API_KEY }}
